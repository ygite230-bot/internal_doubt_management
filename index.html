<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Doubt Management Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header><h1>Internal Doubt Management Portal</h1></header>

<div class="container">

<div class="card">
<h2>New Doubt</h2>

<div class="form-grid">
<div class="form-group">
<label>Domain ID</label>
<select id="domain">
<option value="">Select Domain ID</option>
</select>
</div>

<div class="form-group">
<label>User Name</label>
<input id="username" type="text" readonly placeholder="Auto Filled">
</div>

<div class="form-group">
<label>9 Digit Number</label>
<input id="claimNumber" maxlength="9" placeholder="Enter 9 digit number">
</div>

<div class="form-group">
<label>Category</label>
<select id="category">
<option>Claim</option>
<option>Provider</option>
<option>Bill Type</option>
<option>Diagnosis Code</option>
<option>Pos</option>
<option>DXR Pointer</option>
<option>Modifier</option>
<option>Pass 2 Processing Issue</option>
<option>Bill Amount</option>
<option>History</option>
<option>New Update Doubt (Pass 1)</option>
<option>New Update Doubt (Pass 2)</option>
</select>
</div>
</div>

<div class="form-group">
<label>Comment</label>
<textarea id="comment" rows="5" placeholder="Write your comment here..."></textarea>
</div>

<button id="saveBtn">Save Record</button>
</div>

<div class="card">
<h2>Search</h2>
<input id="searchBox" placeholder="Search by Domain, Name, Number or Comment">
</div>

<div class="card">
<h2>Admin Panel</h2>
<input id="adminPassword" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<br><br>
<input id="newPassword" type="password" placeholder="New Password">
<button id="changePasswordBtn">Change Password</button>
</div>

<div class="card">
<h2>Records <span id="recordCount">Total: 0</span></h2>
<table border="1" width="100%">
<thead>
<tr>
<th>#</th><th>Domain ID</th><th>User Name</th><th>9 Digit Number</th><th>Category</th><th>Comment</th><th>Actions</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script src="js/users.js"></script>
<script src="js/storage.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
</body>
</html>
